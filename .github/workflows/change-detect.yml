name: Provider pricing-page change detection

on:
  schedule:
    - cron: "23 7 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check each provider source_url for verified-price markers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: node scripts/check-pricing-pages.mjs