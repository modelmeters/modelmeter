name: Provider pricing-page change detection

on:
  workflow_dispatch: {}
  # Disabled: script moved to modelmeter-ops, now run via Hermes on Mac Mini

permissions:
  contents: read
  issues: write

jobs:
  detect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check each provider source_url for verified-price markers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: node scripts/check-pricing-pages.mjs