name: Daily pricing snapshot

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Write today's snapshot if pricing changed
        run: node scripts/snapshot.mjs

      - name: Commit snapshot
        run: |
          if [ -z "$(git status --porcelain pricing/snapshots/)" ]; then
            echo "No pricing change since last snapshot."
            exit 0
          fi
          git config user.name "modelmeter-bot"
          git config user.email "bot@modelmeter.xyz"
          git add pricing/snapshots/
          git commit -m "pricing: daily snapshot $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt rejected. Fetching and rebasing..."
            git fetch origin main
            git rebase origin/main || { echo "Rebase failed"; exit 1; }
            sleep $((attempt * 3))
          done
          echo "Push still failing after 5 attempts."
          exit 1