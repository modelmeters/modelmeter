name: Daily pricing snapshot

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Write today's snapshot if pricing changed
        run: node scripts/snapshot.mjs

      - name: Commit snapshot
        run: |
          if [ -n "$(git status --porcelain pricing/snapshots/)" ]; then
            git config user.name "modelmeter-bot"
            git config user.email "bot@modelmeter.xyz"
            git add pricing/snapshots/
            git commit -m "pricing: daily snapshot $(date -u +%Y-%m-%d)"
            # Rebase onto any concurrent pushes before our push
            git pull --rebase origin main
            git push
          else
            echo "No pricing change since last snapshot."
          fi