name: Daily news digest

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Run aggregator
        run: node scripts/digest.mjs

      - name: Commit digest
        run: |
          if [ -z "$(git status --porcelain digest/)" ]; then
            echo "No new digest entries."
            exit 0
          fi
          git config user.name "modelmeter-bot"
          git config user.email "bot@modelmeter.xyz"
          git add digest/
          git commit -m "digest: candidates for $(date -u +%Y-%m-%d)"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt rejected. Fetching and rebasing..."
            git fetch origin main
            git rebase origin/main || { echo "Rebase failed"; exit 1; }
            sleep $((attempt * 3))
          done
          echo "Push still failing after 5 attempts."
          exit 1